# 매니페스트 템플릿 (Manifest Template)
# 이 파일을 복사하여 각 모델별 manifest.yaml을 생성하세요

# [프로젝트 설정]
# 프로젝트 또는 모델명 (산출물 파일명 접두어)
project_name: "Your_Project_Name"  
version: "1.0.0"

# [전역 정의]
# SLOT_Master와 ValTable_Master는 각 엑셀 파일 내의 시트로 포함됩니다.
# 전역적으로 공유되는 기본 정의가 필요한 경우에만 별도 파일로 관리합니다.
# 빈 리스트도 허용됩니다 (각 레벨의 엑셀 파일 내 시트로 충분한 경우)
base_definitions: []
# 전역 정의 파일이 필요한 경우 아래와 같이 추가:
# base_definitions:
#   - "specs/slot_master.xlsx"      # 전역 SLOT 정의
#   - "specs/valtable_master.xlsx"  # 전역 ValTable 정의

# [상속 구조]
# Level 0 → Level 4 순서로 기입 필수
# 뒤에 오는 파일이 앞의 내용을 덮어씀 (Last Write Wins)
# 사용하지 않는 레벨은 주석 처리하거나 삭제하세요
inheritance:
  - "specs/j1939_standard.xlsx"                                    # Level 0: J1939 표준 (필수)
  - "specs/00_common/common_spec.xlsx"                             # Level 1: 전사 공통 (필수)
  # Level 2: 장비 종류별 (예: excavator, wheel_loader)
  # - "specs/00_common/10_excavator/excavator_spec.xlsx"
  # - "specs/00_common/20_wheel_loader/wheel_loader_spec.xlsx"
  # Level 3: 서브 타입 (예: diesel, electric) - 선택사항
  # - "specs/00_common/10_excavator/11_diesel/diesel_spec.xlsx"
  # - "specs/00_common/10_excavator/12_electric/electric_spec.xlsx"
  # Level 4: 모델 전용 (필수)
  # - "specs/00_common/10_excavator/12_electric/01_CEABC/CEABC_spec.xlsx"

